<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        /* CSS Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7fe;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h2 {
            color: #1e293b;
            margin-bottom: 20px;
        }

        /* Calculator Card */
        .calculator {
            background-color: #1e293b;
            border-radius: 12px;
            padding: 20px;
            width: 300px;
            box-shadow: 0 10px 15px rgba(0,0,0,0.15);
        }

        /* Display Screen */
        .screen {
            background-color: #0f172a;
            color: #ffffff;
            font-size: 32px;
            padding: 15px;
            border-radius: 6px;
            text-align: right;
            margin-bottom: 15px;
            min-height: 70px;
            word-wrap: break-word;
            word-break: break-all;
        }

        /* Buttons Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            color: white;
            background-color: #334155;
            border: none;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #475569;
        }

        /* Special Buttons Color */
        .btn-clear {
            background-color: #ef4444;
        }
        .btn-clear:hover {
            background-color: #dc2626;
        }

        .btn-equal {
            background-color: #10b981;
        }
        .btn-equal:hover {
            background-color: #059669;
        }
    </style>
</head>
<body>

    <h2>JavaScript Calculator</h2>

    <div class="calculator">
        <!-- Screen -->
        <div class="screen" id="display">0</div>
        
        <!-- Buttons -->
        <div class="grid">
            <button onclick="press('7')">7</button>
            <button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button>
            <button onclick="press('/')">/</button>

            <button onclick="press('4')">4</button>
            <button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button>
            <button onclick="press('*')">*</button>

            <button onclick="press('1')">1</button>
            <button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button>
            <button onclick="press('-')">-</button>

            <button class="btn-clear" onclick="clearScreen()">C</button>
            <button onclick="press('0')">0</button>
            <button class="btn-equal" onclick="calculate()">=</button>
            <button onclick="press('+')">+</button>
        </div>
    </div>

    <script>
        let displayDiv = document.getElementById('display');
        let currentInput = '';

        function press(num) {
            if (currentInput === '0' || currentInput === 'Error') {
                currentInput = num;
            } else {
                currentInput += num;
            }
            displayDiv.innerText = currentInput;
        }

        function clearScreen() {
            currentInput = '0';
            displayDiv.innerText = currentInput;
        }

        function calculate() {
            try {
                // Evaluates the string math expression safely
                let result = Function('"use strict"; return (' + currentInput + ')')();
                currentInput = String(result);
                displayDiv.innerText = currentInput;
            } catch (error) {
                currentInput = 'Error';
                displayDiv.innerText = currentInput;
            }
        }
    </script>

</body>
</html>
