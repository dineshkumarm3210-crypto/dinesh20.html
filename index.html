<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Web Development</title>
    <style>
        /* CSS Reset and Variables */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

       /* Container Card */
.container {
    background: #ffffff;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    max-width: 500px;
    width: 100%;
    text-align: center;
}

/* New Block: Added to align buttons side-by-side */
.button-group {
    display: flex;
    gap: 15px;
    justify-content: center;
    margin: 25px 0;
}

.button-group button, .button-group .btn {
    flex: 1;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

        h1 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 24px;
        }

        p {
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 16px;
        }

        /* Button Grid Alignment Fix */
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap; /* Keeps buttons aligned on smaller screens */
            width: 100%;
        }

        /* Styled Buttons */
        .btn {
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1; /* Ensures equal widths */
            min-width: 140px; /* Prevents text crowding */
            text-align: center;
        }

        .btn-primary {
            background-color: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: #2ecc71;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #27ae60;
            transform: translateY(-2px);
        }

        /* Status Output Box */
        #output {
            margin-top: 25px;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            background-color: #f8f9fa;
            border: 1px dashed #bdc3c7;
            display: none; /* Hidden until clicked */
        }
    </style>
</head>
<body>

   <div class="button-container">
    <button class="btn-js">Learn JS</button>
    <button class="btn-react">Learn React</button>
</div>
        <!-- Properly aligned button section -->
        <div class="button-group">
            <button class="btn btn-primary" onclick="showMessage('JavaScript')">Learn JS</button>
            <button class="btn btn-secondary" onclick="showMessage('React')">Learn React</button>
        </div>

        <!-- Dynamic Output Area -->
        <div id="output"></div>
    </div>

    <script>
        // Simple JavaScript function to handle button events dynamically
        function showMessage(topic) {
            const outputDiv = document.getElementById('output');
            outputDiv.style.display = 'block';
            
            if (topic === 'JavaScript') {
                outputDiv.style.color = '#3498db';
                outputDiv.innerHTML = '⚡ JavaScript is the core foundation. Master it first!';
            } else if (topic === 'React') {
                outputDiv.style.color = '#2ecc71';
                outputDiv.innerHTML = '🚀 React helps you build complex websites effortlessly!';
            }
        }
    </script>

</body>
</html>
